---
- name: Ensure Hadoop config directory exists
  ansible.builtin.file:
    path: "{{ hadoop_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Create NameNode metadata directory
  ansible.builtin.file:
    path: "{{ hdfs_namenode_dir }}"
    state: directory
    owner: hdfs
    group: hadoop
    mode: "0755"
  become: true
  when: "'master' in group_names"

- name: Create DataNode data directory
  ansible.builtin.file:
    path: "{{ hdfs_datanode_dir }}"
    state: directory
    owner: hdfs
    group: hadoop
    mode: "0755"
  become: true
  when: "'workers' in group_names"

- name: Deploy core-site.xml
  ansible.builtin.template:
    src: core-site.xml.j2
    dest: "{{ hadoop_conf_dir }}/core-site.xml"
    owner: root
    group: hadoop
    mode: "0644"
  become: true

- name: Deploy hdfs-site.xml
  ansible.builtin.template:
    src: hdfs-site.xml.j2
    dest: "{{ hadoop_conf_dir }}/hdfs-site.xml"
    owner: root
    group: hadoop
    mode: "0644"
  become: true

- name: Set JAVA_HOME in hadoop-env.sh
  ansible.builtin.blockinfile:
    path: "{{ hadoop_conf_dir }}/hadoop-env.sh"
    marker: "# {mark} ANSIBLE MANAGED JAVA_HOME"
    block: |
      export JAVA_HOME={{ java_home }}
    create: true
    owner: root
    group: hadoop
    mode: "0644"
  become: true

- name: Configure HDFS JMX Exporter options
  ansible.builtin.blockinfile:
    path: "{{ hadoop_conf_dir }}/hadoop-env.sh"
    marker: "# {mark} ANSIBLE MANAGED HDFS JMX EXPORTER"
    block: |
      {% if 'master' in group_names %}
      export HDFS_NAMENODE_OPTS="$HDFS_NAMENODE_OPTS -javaagent:{{ jmx_exporter_jar }}={{ jmx_namenode_port }}:{{ jmx_exporter_dir }}/hadoop-jmx.yml"
      {% endif %}
      {% if 'workers' in group_names %}
      export HDFS_DATANODE_OPTS="$HDFS_DATANODE_OPTS -javaagent:{{ jmx_exporter_jar }}={{ jmx_datanode_port }}:{{ jmx_exporter_dir }}/hadoop-jmx.yml"
      {% endif %}
    create: true
    owner: root
    group: hadoop
    mode: "0644"
  become: true
