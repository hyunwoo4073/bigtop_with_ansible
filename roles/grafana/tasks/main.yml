---
- name: Install Grafana repository dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - wget
      - gnupg
    state: present
    update_cache: true
    lock_timeout: 300
  become: true

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Download Grafana GPG key
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg-full.key
    dest: /etc/apt/keyrings/grafana.asc
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Add Grafana apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/grafana.list
    owner: root
    group: root
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main
  become: true

- name: Install Grafana OSS
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: true
    lock_timeout: 300
  become: true

- name: Ensure Grafana datasource provisioning directory exists
  ansible.builtin.file:
    path: "{{ grafana_provisioning_datasource_dir }}"
    state: directory
    owner: root
    group: grafana
    mode: "0755"
  become: true

- name: Ensure Grafana dashboard provisioning directory exists
  ansible.builtin.file:
    path: "{{ grafana_provisioning_dashboard_dir }}"
    state: directory
    owner: root
    group: grafana
    mode: "0755"
  become: true

- name: Ensure Grafana dashboard directory exists
  ansible.builtin.file:
    path: "{{ grafana_dashboard_dir }}"
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"
  become: true

- name: Provision Prometheus datasource
  ansible.builtin.template:
    src: datasources/prometheus.yml.j2
    dest: "{{ grafana_provisioning_datasource_dir }}/prometheus.yml"
    owner: root
    group: grafana
    mode: "0644"
  become: true
  notify: Restart grafana

- name: Provision dashboard provider
  ansible.builtin.template:
    src: dashboards/platform.yml.j2
    dest: "{{ grafana_provisioning_dashboard_dir }}/platform.yml"
    owner: root
    group: grafana
    mode: "0644"
  become: true
  notify: Restart grafana

- name: Deploy Bigtop platform overview dashboard
  ansible.builtin.template:
    src: dashboard_json/bigtop-platform-overview.json.j2
    dest: "{{ grafana_dashboard_dir }}/bigtop-platform-overview.json"
    owner: grafana
    group: grafana
    mode: "0644"
  become: true
  notify: Restart grafana

- name: Deploy HDFS health overview dashboard
  ansible.builtin.template:
    src: dashboard_json/hdfs-health-overview.json.j2
    dest: "{{ grafana_dashboard_dir }}/hdfs-health-overview.json"
    owner: grafana
    group: grafana
    mode: "0644"
  become: true
  notify: Restart grafana

- name: Deploy NameNode backup overview dashboard
  ansible.builtin.template:
    src: dashboard_json/namenode-backup-overview.json.j2
    dest: "{{ grafana_dashboard_dir }}/namenode-backup-overview.json"
    owner: grafana
    group: grafana
    mode: "0644"
  become: true
  notify: Restart grafana

- name: Deploy YARN resource overview dashboard
  ansible.builtin.template:
    src: dashboard_json/yarn-resource-overview.json.j2
    dest: "{{ grafana_dashboard_dir }}/yarn-resource-overview.json"
    owner: grafana
    group: grafana
    mode: "0644"
  become: true
  notify: Restart grafana

- name: Deploy Spark history overview dashboard
  ansible.builtin.template:
    src: dashboard_json/spark-history-overview.json.j2
    dest: "{{ grafana_dashboard_dir }}/spark-history-overview.json"
    owner: grafana
    group: grafana
    mode: "0644"
  become: true
  notify: Restart grafana

- name: Deploy YARN Queue Overview dashboard
  ansible.builtin.template:
    src: dashboard_json/yarn-queue-overview.json.j2
    dest: "{{ grafana_dashboard_dir }}/yarn-queue-overview.json"
    owner: root
    group: grafana
    mode: "0644"
  become: true
  notify: Restart grafana

- name: Start and enable Grafana
  ansible.builtin.service:
    name: grafana-server
    state: started
    enabled: true
  become: true

- name: Wait for Grafana port
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ grafana_port }}"
    timeout: 60