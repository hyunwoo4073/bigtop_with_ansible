---
- name: Install prometheus-node-exporter
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: present
    update_cache: true
    lock_timeout: 300
  become: true

- name: Start and enable prometheus-node-exporter
  ansible.builtin.service:
    name: prometheus-node-exporter
    state: started
    enabled: true
  become: true

- name: Wait for node exporter port
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ node_exporter_port }}"
    timeout: 30

- name: Ensure Node Exporter textfile collector directory exists
  ansible.builtin.file:
    path: "{{ node_exporter_textfile_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Configure Node Exporter textfile collector
  ansible.builtin.copy:
    dest: /etc/default/prometheus-node-exporter
    owner: root
    group: root
    mode: "0644"
    content: |
      ARGS="--collector.textfile.directory={{ node_exporter_textfile_dir }}"
  become: true
  notify: Restart node exporter