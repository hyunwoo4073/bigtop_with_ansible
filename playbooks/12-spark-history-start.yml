---
- name: Start Spark History Server
  hosts: master
  become: true
  tasks:
    - name: Reset failed Spark History Server state
      ansible.builtin.shell: |
        systemctl reset-failed spark-history-server || true
      changed_when: false

    - name: Start and enable Spark History Server
      block:
        - name: Start spark-history-server
          ansible.builtin.service:
            name: spark-history-server
            state: started
            enabled: true

        - name: Wait for Spark History Server UI
          ansible.builtin.wait_for:
            host: "{{ yarn_resourcemanager_host }}"
            port: 18080
            timeout: 60

      rescue:
        - name: Show Spark History Server status
          ansible.builtin.shell: systemctl status spark-history-server --no-pager -l || true
          changed_when: false

        - name: Show Spark History Server journal
          ansible.builtin.shell: journalctl -u spark-history-server -n 120 --no-pager || true
          changed_when: false

        - name: Show Spark logs
          ansible.builtin.shell: tail -120 /var/log/spark/*history*.log 2>/dev/null || true
          changed_when: false

        - name: Fail after Spark History Server debug output
          ansible.builtin.fail:
            msg: "Spark History Server failed to start. See logs above."
