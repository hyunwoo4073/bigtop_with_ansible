---
- name: Start Spark History Server
  hosts: master
  become: true

  tasks:
    - name: Reset failed spark-history-server
      ansible.builtin.shell: systemctl reset-failed spark-history-server || true
      changed_when: false

    - name: Ensure Spark History Server systemd override directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/spark-history-server.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configure Spark History Server systemd override
      ansible.builtin.copy:
        dest: /etc/systemd/system/spark-history-server.service.d/override.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          After=network-online.target hadoop-hdfs-namenode.service
          Wants=network-online.target hadoop-hdfs-namenode.service

          [Service]
          Restart=on-failure
          RestartSec=30

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start and enable spark-history-server
      ansible.builtin.service:
        name: spark-history-server
        state: started
        enabled: true

    - name: Check spark-history-server status
      ansible.builtin.shell: systemctl status spark-history-server --no-pager -l || true
      changed_when: false

    - name: Show spark-history-server logs
      ansible.builtin.shell: journalctl -u spark-history-server -n 120 --no-pager || true
      changed_when: false